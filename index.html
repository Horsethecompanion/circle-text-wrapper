<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Text Wrapper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; color: #1a1a2e; }
    .controls { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: center; }
    label { font-size: 0.875rem; color: #555; }
    input[type="range"] { width: 160px; accent-color: #7c6af7; }
    .input-area { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1100px; }
    textarea {
      width: 340px; height: 420px;
      background: #f4f5f7; border: 1px solid #dcdcdc; border-radius: 8px;
      color: #1a1a2e; font-family: 'Georgia', serif; font-size: 0.9rem;
      line-height: 1.8; padding: 1rem; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #7c6af7; }
    .preview-wrap { width: 340px; height: 420px; display: flex; align-items: center; justify-content: center; }

    /* === CIRCLE TEXT WRAPPER === */
    .circle-container {
      --s: 300px; --p: 18px; --bg: #7c6af7; --text-color: #ffffff;
      --center-size: 0px; --center-color: #000000;
      width: var(--s); height: var(--s); border-radius: 50%;
      position: relative; background: var(--bg); overflow: hidden;
    }
    .circle-container i, .circle-container::before {
      content: ''; float: left; height: 100%; width: 50%;
      shape-outside: radial-gradient(farthest-side at right, transparent calc(100% - var(--p)), var(--text-bg) calc(100% - var(--p)));
    }
    .circle-container i {
      float: right;
      shape-outside: radial-gradient(farthest-side at left, transparent calc(100% - var(--p)), var(--text-bg) calc(100% - var(--p)));
    }
    .circle-text {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: var(--p); font-family: 'Georgia', serif; font-size: 0.8rem;
      line-height: 1.6; color: var(--text-color); word-break: break-word;
      overflow: hidden; z-index: 2;
    }
    .circle-center {
      position: absolute; border-radius: 50%; background: var(--center-color);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: var(--center-size); height: var(--center-size); z-index: 1;
    }
    /* === END CIRCLE TEXT WRAPPER === */

    .export-btns { display: flex; gap: 0.75rem; }
    button { background: #7c6af7; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1.25rem; font-size: 0.875rem; cursor: pointer; transition: background 0.15s; }
    button:hover { background: #6b5ce7; }
    button.secondary { background: #2a2a4a; color: #ccc; }
    button.secondary:hover { background: #3a3a5a; }
    #size-value { font-size: 0.8rem; color: #888; min-width: 40px; text-align: right; }
    .color-row { display: flex; gap: 0.75rem; align-items: center; }
    input[type="color"] { width: 36px; height: 28px; border: none; border-radius: 4px; cursor: pointer; background: none; padding: 0; }
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: #e0e0e0; padding: 0.5rem 1rem;
      border-radius: 6px; font-size: 0.85rem;
      transition: transform 0.3s ease; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <h1>Circle Text Wrapper</h1>

  <div class="controls">
    <label>Circle size: <span id="size-value">300</span>px</label>
    <input type="range" id="size-slider" min="200" max="500" value="300">
    <label style="margin-left:0.5rem;">Padding:</label>
    <input type="range" id="padding-slider" min="8" max="50" value="18" style="width:100px">
    <div class="color-row">
      <label>Circle:</label><input type="color" id="bg-color" value="#7c6af7">
      <label>Text:</label><input type="color" id="text-color" value="#ffffff">
    </div>
  </div>

  <div class="controls" style="gap:0.75rem;">
    <label>Centre size: <span id="center-size-value">0</span>px</label>
    <input type="range" id="center-size-slider" min="0" max="120" value="0">
    <div class="color-row">
      <label>Centre:</label><input type="color" id="center-color" value="#000000">
    </div>
  </div>

  <div class="input-area">
    <textarea id="input-text" placeholder="Paste your poem here...

The owl and the pussycat
went to sea in a beautiful pea-green boat..."></textarea>
    <div class="preview-wrap" id="preview-wrap">
      <div class="circle-container" id="circle">
        <i></i>
        <div class="circle-text" id="circle-text"></div>
        <div class="circle-center" id="center"></div>
      </div>
    </div>
  </div>

  <div class="export-btns">
    <button id="btn-html">Copy HTML</button>
    <button id="btn-css" class="secondary">Copy CSS</button>
    <button id="btn-screenshot" class="secondary">Download PNG</button>
  </div>

  <div id="toast"></div>

  <script>
    const textarea = document.getElementById('input-text');
    const circleText = document.getElementById('circle-text');
    const sizeSlider = document.getElementById('size-slider');
    const paddingSlider = document.getElementById('padding-slider');
    const sizeValue = document.getElementById('size-value');
    const bgColor = document.getElementById('bg-color');
    const textColor = document.getElementById('text-color');
    const circle = document.getElementById('circle');
    const centerSizeSlider = document.getElementById('center-size-slider');
    const centerSizeValue = document.getElementById('center-size-value');
    const centerColor = document.getElementById('center-color');

    function update() {
      circleText.innerHTML = textarea.value
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }
    function updateSize() {
      circle.style.setProperty('--s', sizeSlider.value + 'px');
      sizeValue.textContent = sizeSlider.value;
    }
    function updatePadding() { circle.style.setProperty('--p', paddingSlider.value + 'px'); }
    function updateCenter() {
      circle.style.setProperty('--center-size', centerSizeSlider.value + 'px');
      centerSizeValue.textContent = centerSizeSlider.value;
    }

    textarea.addEventListener('input', update);
    sizeSlider.addEventListener('input', updateSize);
    paddingSlider.addEventListener('input', updatePadding);
    centerSizeSlider.addEventListener('input', updateCenter);
    bgColor.addEventListener('input', () => circle.style.setProperty('--bg', bgColor.value));
    textColor.addEventListener('input', () => circle.style.setProperty('--text-color', textColor.value));
    centerColor.addEventListener('input', () => circle.style.setProperty('--center-color', centerColor.value));

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Copy HTML
    document.getElementById('btn-html').addEventListener('click', () => {
      const s = sizeSlider.value, p = paddingSlider.value, bg = bgColor.value;
      const tc = textColor.value, cs = centerSizeSlider.value, cc = centerColor.value;
      const text = textarea.value;
      const centerHTML = cs > 0 ? `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${cs}px;height:${cs}px;border-radius:50%;background:${cc};"></div>` : '';
      const html = `<div style="--s:${s}px;--p:${p}px;width:var(--s);height:var(--s);border-radius:50%;position:relative;background:${bg};overflow:hidden;display:flex;align-items:center;justify-content:center;">
  <i style="content:'';float:left;height:100%;width:50%;shape-outside:radial-gradient(farthest-side at right,transparent calc(100% - var(--p)),#fff calc(100% - var(--p)));"></i>
  <i style="content:'';float:right;height:100%;width:50%;shape-outside:radial-gradient(farthest-side at left,transparent calc(100% - var(--p)),#fff calc(100% - var(--p)));"></i>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:var(--p);font-family:Georgia,serif;font-size:0.85rem;line-height:1.6;color:${tc};word-break:break-word;">
${text}
  </div>${centerHTML}
</div>`;
      navigator.clipboard.writeText(html);
      showToast('HTML copied!');
    });

    // Copy CSS
    document.getElementById('btn-css').addEventListener('click', () => {
      const s = sizeSlider.value, p = paddingSlider.value, bg = bgColor.value;
      const tc = textColor.value, cs = centerSizeSlider.value, cc = centerColor.value;
      const css = `.circle-container{--s:${s}px;--p:${p}px;width:var(--s);height:var(--s);border-radius:50%;position:relative;background:${bg};overflow:hidden}
.circle-container i,.circle-container::before{content:'';float:left;height:100%;width:50%;shape-outside:radial-gradient(farthest-side at right,transparent calc(100% - var(--p)),#fff calc(100% - var(--p)))}
.circle-container i{float:right;shape-outside:radial-gradient(farthest-side at left,transparent calc(100% - var(--p)),#fff calc(100% - var(--p)))}
.circle-text{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:var(--p);font-family:Georgia,serif;font-size:0.85rem;line-height:1.6;color:${tc};word-break:break-word}
.center-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${cs}px;height:${cs}px;border-radius:50%;background:${cc}}`;
      navigator.clipboard.writeText(css);
      showToast('CSS copied!');
    });

    // Download PNG
    document.getElementById('btn-screenshot').addEventListener('click', () => {
      const S = parseInt(sizeSlider.value);
      const P = parseInt(paddingSlider.value);
      const bg = bgColor.value;
      const tc = textColor.value;
      const CS = parseInt(centerSizeSlider.value);
      const CC = centerColor.value;
      const rawText = textarea.value;

      const canvas = document.createElement('canvas');
      canvas.width = S;
      canvas.height = S;
      const ctx = canvas.getContext('2d');

      // Draw circle background
      ctx.beginPath();
      ctx.arc(S / 2, S / 2, S / 2, 0, Math.PI * 2);
      ctx.fillStyle = bg;
      ctx.fill();

      // Clip text drawing to the inner circle area
      ctx.save();
      ctx.beginPath();
      ctx.arc(S / 2, S / 2, (S - 2 * P) / 2, 0, Math.PI * 2);
      ctx.clip();

      ctx.fillStyle = tc;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const fontSize = Math.max(10, Math.round(S * 0.04));
      ctx.font = `${fontSize}px Georgia, serif`;

      const lineHeight = fontSize * 1.5;
      const lines = rawText.split('\n');
      const totalTextHeight = lines.length * lineHeight;
      let yOffset = (S - totalTextHeight) / 2 + lineHeight / 2;

      for (const line of lines) {
        const words = line.split(' ');
        let currentLine = '';
        for (const word of words) {
          const testLine = currentLine ? currentLine + ' ' + word : word;
          const metrics = ctx.measureText(testLine);
          const yFromCenter = yOffset - S / 2;
          const halfChord = Math.sqrt(Math.max(0, Math.pow((S - 2 * P) / 2, 2) - yFromCenter * yFromCenter));
          if (metrics.width / 2 > halfChord && currentLine !== '') {
            ctx.fillText(currentLine, S / 2, yOffset);
            yOffset += lineHeight;
            currentLine = word;
          } else {
            currentLine = testLine;
          }
        }
        if (currentLine) {
          ctx.fillText(currentLine, S / 2, yOffset);
          yOffset += lineHeight;
        } else {
          yOffset += lineHeight;
        }
      }
      ctx.restore();

      // Draw centre circle — erase any text that overlaps it first
      if (CS > 0) {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(S / 2, S / 2, CS / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        // Fill with centre colour
        ctx.beginPath();
        ctx.arc(S / 2, S / 2, CS / 2, 0, Math.PI * 2);
        ctx.fillStyle = CC;
        ctx.fill();
      }

      const link = document.createElement('a');
      link.download = 'circle-poem.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('PNG downloaded!');
    });

    update();
  </script>
</body>
</html>
